app:
  debug: false
  output_dir: "./output"
  log_level: "INFO"

data:
  ticker: "AAPL"
  interval: "1d"
  period: "60d"
  session_timezone: "America/New_York"
  intrabar_source: "yahoo"
  intrabar_interval: "30m"
  include_extended_hours: false
  intrabar_path: null
  intrabar_timestamp_col: "timestamp"
  intrabar_price_col: "price"
  intrabar_volume_col: "volume"
  intrabar_bar_id_col: "bar_id"

algorithm:
  mode: "real" # 'synthetic' or 'real'
  nbins: 20
  volatility_factor: 0.03
  enable_volume_weighting: true
  synthetic_tick_count: 100
  synthetic_ensemble_size: 1
  synthetic_model: "ohlc_bridge"
  random_seed: 42
  value_area_ratio: 0.68
  poc_tie_policy: "midpoint"

features:
  export_csv: true
  export_formats:
    - "csv"
  enable_poc_overlay: true
  enable_poc_marker: true
  enable_poc_drift_line: true
  enable_value_area: true
  concentration_ratio_flagging: true
  enable_indecision_flags: true
  indecision_quantile: 0.25
  indecision_min_samples: 20

rendering:
  enable_chart: true
  full_heatmap: false
  extend_to_tails: true
  align_overlays_to_visible_heatmap: true
  show_candles: true
  show_session_gaps: true
  break_poc_drift_on_gaps: true
  color_scheme:
    bull: "rgba(38, 166, 154, {alpha})"
    bear: "rgba(239, 83, 80, {alpha})"
  overlay_style:
    poc_color: "gold"
    poc_width: 3
    poc_drift_dash: "dash"
    value_area_color: "deepskyblue"
    value_area_fill: "rgba(0, 191, 255, 0.08)"
    value_area_dash: "dot"
    indecision_color: "purple"
    indecision_size: 11
    candle_half_width: 0.4
  legend:
    enabled: true
    position: "top_right"
